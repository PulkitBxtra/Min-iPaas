spring.application.name=AppCatalogService

# REST + gRPC multiplexed on one port (Gateway=8080, ConnectorService=8081/9090).
server.port=8082
server.error.include-message=always

# MongoDB — real URI in application-local.properties (gitignored) or env vars.
# Never commit credentials here (unlike Gateway, which does — see README note).
spring.mongodb.uri=${SPRING_MONGODB_URI:}
spring.mongodb.database=${SPRING_MONGODB_DATABASE:AppCatalog}

# Catalog seeding: set true to wipe & reload from the vendored snapshot on boot.
catalog.reseed=false
