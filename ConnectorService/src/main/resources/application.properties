spring.application.name=ConnectorService

# Datasource — values come from env vars or application-local.properties (gitignored).
# Never hardcode credentials in this file; it is committed to git.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# REST on 8081 (Gateway uses 8080); gRPC stays on spring-grpc default 9090.
server.port=8081

# Token-vault config. Provider client-secret values go in application-local.properties.
connectors.callback-base-url=http://localhost:8081
connectors.refresh.sweep-interval-ms=60000
connectors.refresh.skew-seconds=120

